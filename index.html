<script>const AUTH_KEY = 'tw_acg_admin_hash';
let isAdmin = false;
async function hashPw(password, salt) {
const str = password + salt;
try {
const enc = new TextEncoder();
const raw = await crypto.subtle.digest('SHA-256', enc.encode(str));
return Array.from(new Uint8Array(raw)).map(b => b.toString(16).padStart(2,'0')).join('');
} catch (_) {
let h = 0;
for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
return Math.abs(h).toString(16);
}
}
function genSalt() {
const a = new Uint8Array(16);
(crypto.getRandomValues || function(a){for(let i=0;i<a.length;i++)a[i]=Math.random()*256|0})(a);
return Array.from(a).map(b => b.toString(16).padStart(2,'0')).join('');
}
function checkSession() { return sessionStorage.getItem('tw_acg_admin') === '1'; }
async function doAuth(password) {
const stored = localStorage.getItem(AUTH_KEY);
if (!stored) {
const salt = genSalt();
const hash = await hashPw(password, salt);
safeSetItem(AUTH_KEY, JSON.stringify({ hash, salt }));
sessionStorage.setItem('tw_acg_admin', '1');
return true;
}
const { hash: sh, salt: ss } = JSON.parse(stored);

}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
const chars = text.split('');
let line = '';
let lines = [];
for (const ch of chars) {
const test = line + ch;
if (ctx.measureText(test).width > maxWidth && line) {
lines.push(line); line = ch;
} else line = test;
}
lines.push(line);
const startY = y - ((lines.length - 1) * lineHeight) / 2;
lines.forEach((l,i) => ctx.fillText(l, x, startY + i * lineHeight));
}
